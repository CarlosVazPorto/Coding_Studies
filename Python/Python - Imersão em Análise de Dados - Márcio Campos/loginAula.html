<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #40E0D0; /* Azul piscina */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            max-width: 900px;
            display: flex;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }
        .login-container .image-container {
            flex: 1;
            background: url('imagemcar1.jpg') no-repeat center center;
            background-size: cover;
        }
        .login-container .form-container {
            flex: 1;
            padding: 20px;
        }
        .login-container h2 {
            margin-bottom: 20px;
        }
        .toggle-password {
            cursor: pointer;
        }
        .btn-custom {
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 20px;
            background-color: #007bff; /* Azul padrão do Bootstrap */
            border: none;
            color: white;
        }
        .btn-custom:hover {
            background-color: #0056b3; /* Azul mais escuro */
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="image-container"></div>
        <div class="form-container">
            <h2>Acesso</h2>
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" class="form-control" id="email" placeholder="nome de usuário, e-mail ou celular" required>
                </div>
                <div class="form-group">
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" placeholder="digite sua senha" required>
                        <div class="input-group-append">
                            <span class="input-group-text toggle-password" onclick="togglePassword()">
                                <i class="fa fa-eye" id="togglePasswordIcon"></i>
                            </span>
                        </div>
                    </div>
                    <small id="passwordHelp" class="form-text text-muted">
                        A senha deve conter no mínimo 6 caracteres: incluindo letras maiúsculas e minúsculas, número e 1 caractere especial no mínimo.
                    </small>
                </div>
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="stayConnected">
                    <label class="form-check-label" for="stayConnected">Manter-me conectado</label>
                </div>
                <button type="submit" class="btn btn-custom btn-block">Login</button>
                <div class="text-center mt-3">
                    <a href="#">Esqueci</a> |
                    <a href="#">Lembrete</a> |
                    <a href="#">Criar conta</a>
                </div>
            </form>
        </div>
    </div>
    <script src="https://use.fontawesome.com/releases/v5.15.1/js/all.js"></script>
    <script>
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const togglePasswordIcon = document.getElementById('togglePasswordIcon');
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                togglePasswordIcon.classList.remove('fa-eye');
                togglePasswordIcon.classList.add('fa-eye-slash');
            } else {
                passwordField.type = 'password';
                togglePasswordIcon.classList.remove('fa-eye-slash');
                togglePasswordIcon.classList.add('fa-eye');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{6,}$/;
            if (!passwordRegex.test(password)) {
                alert('A senha deve ter no mínimo 6 caracteres, incluindo maiúscula, minúscula, número e caractere especial.');
            } else {
                alert('Login realizado com sucesso!');
                // Aqui você pode adicionar a lógica de envio do formulário
            }
        });
    </script>
</body>
</html>
