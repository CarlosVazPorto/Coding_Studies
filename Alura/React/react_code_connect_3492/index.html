<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/styles.css" />
    <link rel="stylesheet" href="./styles/PaginaDeLogin.css" />
    <link rel="stylesheet" href="./styles/CampoDeDigitacao.css" />
    <title>Login | CodeConnect</title>
  </head>

  <body>
    <div id="root"></div>

 <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"
        integrity="sha512-8Q6Y9XnTbOE+JNvjBQwJ2H8S+UV4uA6hiRykhdtIyDYZ2TprdNmWOUaKdGzOhyr4dCyk287OejbPvwl7lrfqrQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"
        integrity="sha512-MOCpqoRoisCTwJ8vQQiciZv0qcpROCidek3GTFS6KTk2+y7munJIlKCVkFCYY+p3ErYFXCjmFjnfTTRSC1OHWQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"
        integrity="sha512-MIXku7j6pJ0hqd2T4WXZMGerp3BU9B91rfLRDp/McDBNNdnwTD+yLJaz9AHcYXT6k16dYTkG9S2KRPGxaBIfBQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script type="text/babel">
      function Titulo({ children }) {
        return (
          <h1 className="form__titulo">{children}</h1>
        );
      }

      function SubTitulo({ children }) {
        return (
          <h2 className="form__texto">{children}</h2>
        );
      }

      function CampoDeDigitacao({ label, type, placeholder, value, setValor }) {
        return (
          <div className="form__campo-digitacao">
            <label for="CampoDeDigitacao">{label}</label>
            <input type={type}
              placeholder={placeholder}
              id="CampoDeDigitacao"
              value={value} 
              onChange={(evento) => setValor(evento.target.value)}
              required />
          </div>
        )
      }

      function Botao({ children }) {
        return (
          <button type="submit" className="form__botao">{children}</button>
        )
      }

      function PaginaDeLogin() {
        let email = "karl@teste.com";
        function substituiValorDoCampo(novoValor) {
          email = novoValor;
        }

        return (
          <div className="container-login">
            <img src="./img/imagem-login.png" alt="Uma mulher negra utilizando um computador, com o logo da CodeConnect na parte inferior da imagem" />
            <section>
              <form>
                <Titulo>Login</Titulo>
                <SubTitulo>Boas-vindas! Faça seu login.</SubTitulo>
                <CampoDeDigitacao 
                  label="E-mail ou usuário"
                  type="email" 
                  placeholder="Digite seu e-mail ou usuário" 
                  value={email}
                  setValor={substituiValorDoCampo} />
                <CampoDeDigitacao 
                  label="Senha"
                  type="password" 
                  placeholder="Digite sua senha" />
                <Botao>Login</Botao>
              </form>
            </section>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<PaginaDeLogin />);

    </script>
  </body>
</html>
